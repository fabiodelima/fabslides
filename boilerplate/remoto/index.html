<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
  <title>Controle Remoto — FabSlides</title>
  <style>
    :root {
      --color-dark: #071220;
      --color-navy: #0B1E36;
      --color-orange: #E05A10;
      --color-light: #F0EDE8;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; margin:0; padding:0; user-select: none; }
    body {
      font-family: var(--font-sans);
      background-color: var(--color-dark);
      color: var(--color-light);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      padding: 1.5rem;
    }

    /* Área de Status e Conexão */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .status-badge {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      background: rgba(255,255,255,0.08);
    }
    .status-badge.connected { color: #52C41A; background: rgba(82,196,26,0.1); }

    /* Input Código de Sessão WS */
    .session-input-wrapper {
      background: var(--color-navy);
      border: 1px solid rgba(224,90,16,0.2);
      border-radius: 12px;
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .session-input-row { display: flex; gap: 0.8rem; }
    .session-input {
      flex-grow: 1;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 0.6rem;
      color: #FFFFFF;
      font-size: 1.2rem;
      text-align: center;
      letter-spacing: 0.1em;
    }
    .btn-connect {
      background: var(--color-orange);
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      padding: 0.6rem 1.2rem;
      font-weight: 700;
      cursor: pointer;
    }

    /* Cronômetro de Palco */
    .stopwatch-container {
      text-align: center;
      margin: 1.5rem 0;
    }
    .stopwatch-time {
      font-size: 3.5rem;
      font-weight: 700;
      font-family: monospace;
      color: #FFFFFF;
    }

    /* Teleprompter Tele-Apoio */
    .teleprompter-box {
      flex-grow: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 1.2rem;
      margin-bottom: 1.5rem;
      overflow-y: auto;
    }
    .tele-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--color-orange);
      margin-bottom: 0.5rem;
    }
    .tele-text {
      font-size: 1rem;
      line-height: 1.6;
      color: rgba(240,237,232,0.85);
    }

    /* Botões Gigantes Touch */
    .touch-controls {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 1rem;
      height: 150px;
    }
    .touch-btn {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border: none;
      border-radius: 16px;
      font-weight: 700;
      cursor: pointer;
      color: #FFFFFF;
      transition: background 0.1s;
    }
    .touch-btn:active { transform: scale(0.96); }
    .btn-prev {
      background: var(--color-navy);
      font-size: 1rem;
    }
    .btn-next {
      background: var(--color-orange);
      font-size: 1.4rem;
    }
  </style>
</head>
<body>

  <!-- STATUS HEADER -->
  <header>
    <div class="status-badge" id="status-text">DESCONECTADO</div>
    <div id="stopwatch-btn" style="cursor: pointer; color: var(--color-orange); font-size:0.8rem; font-weight:700;">Zerar Relógio</div>
  </header>

  <!-- PAINEL DE CONEXÃO WS -->
  <div class="session-input-wrapper" id="connection-box">
    <p style="font-size:0.8rem; opacity:0.75; text-align:center;">Digite o código de 4 dígitos gerado no projetor:</p>
    <div class="session-input-row">
      <input type="number" pattern="[0-9]*" class="session-input" id="room-id-input" placeholder="0000">
      <button class="btn-connect" id="connect-btn">CONECTAR</button>
    </div>
  </div>

  <!-- CRONÔMETRO -->
  <div class="stopwatch-container">
    <div class="stopwatch-time" id="timer-display">00:00</div>
  </div>

  <!-- TELEPROMPTER -->
  <div class="teleprompter-box">
    <div class="tele-title" id="tele-slide-label">SLIDE --</div>
    <div class="tele-text" id="tele-slide-content">Conecte o celular para visualizar seus talking points aqui em tempo real...</div>
  </div>

  <!-- BOTOES GIGANTES -->
  <div class="touch-controls">
    <button class="touch-btn btn-prev" id="prev-btn">VOLTAR</button>
    <button class="touch-btn btn-next" id="next-btn">AVANÇAR</button>
  </div>

  <script>
    // LÓGICA DE CRONÔMETRO DE PALCO
    let timerInterval = null;
    let secondsElapsed = 0;
    
    function startTimer() {
      if (timerInterval) return;
      timerInterval = setInterval(() => {
        secondsElapsed++;
        const mins = String(Math.floor(secondsElapsed / 60)).padStart(2, '0');
        const secs = String(secondsElapsed % 60).padStart(2, '0');
        document.getElementById('timer-display').innerText = `${mins}:${secs}`;
      }, 1000);
    }

    document.getElementById('stopwatch-btn').addEventListener('click', () => {
      secondsElapsed = 0;
      document.getElementById('timer-display').innerText = "00:00";
    });

    // LÓGICA WEBSOCKET CLIENTE CONTROLE REMOTO
    const WS_URL = 'wss://ws.fabiollima.com';
    let ws = null;

    function initConnection(sessionId) {
      ws = new WebSocket(WS_URL);
      
      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'register', sessionId: sessionId, role: 'remote' }));
        document.getElementById('status-text').innerText = "CONECTADO: " + sessionId;
        document.getElementById('status-text').classList.add('connected');
        document.getElementById('connection-box').style.display = 'none';
        startTimer();
      };

      ws.onmessage = (event) => {
        let data;
        try { data = JSON.parse(event.data); } catch { return; }

        if (data.type === 'state-update') {
          // Atualiza teleprompter local baseado no estado atualizado do Host
          document.getElementById('tele-slide-label').innerText = `Slide ${data.slideIndex + 1}`;
          document.getElementById('tele-slide-content').innerText = `Navegue nos botões de palco. Seu Host está sincronizado com a apresentação. Passo ativo: ${data.stepIndex}`;
        }
      };

      ws.onclose = () => {
        document.getElementById('status-text').innerText = "CONEXÃO PERDIDA";
        document.getElementById('status-text').classList.remove('connected');
        document.getElementById('connection-box').style.display = 'flex';
      };
    }

    document.getElementById('connect-btn').addEventListener('click', () => {
      const code = document.getElementById('room-id-input').value;
      if (code && code.length === 4) {
        initConnection(code);
      }
    });

    // BOTÕES DE TRANSMISSÃO DE COMANDOS
    document.getElementById('next-btn').addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'command', action: 'next' }));
      }
    });
    document.getElementById('prev-btn').addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'command', action: 'prev' }));
      }
    });

    // Fallback para clique de mouse em desenvolvimento desktop
    document.getElementById('next-btn').addEventListener('click', () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'command', action: 'next' }));
      }
    });
    document.getElementById('prev-btn').addEventListener('click', () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'command', action: 'prev' }));
      }
    });
  </script>
</body>
</html>
